name: Release

on:
  push:
    tags:
      - '*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.set_version.outputs.version }}
      versionCode: ${{ steps.set_version.outputs.versionCode }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout target tag
        run: |
          if git describe --tags --abbrev=0 >/dev/null 2>&1; then
            git checkout $(git describe --tags --abbrev=0)
          else
            echo "No tags found, staying on current branch"
          fi

      - name: Set Version
        id: set_version
        run: |
          if git describe --tags --abbrev=0 >/dev/null 2>&1; then
            VERSION=$(git describe --tags --abbrev=0)
          else
            echo "No tags found, attempting to get version from update.json"
            VERSION=$(python -c "import json; print(json.load(open('update.json'))['version'])" || echo "1.0.0")
          fi

          COUNT=$(git rev-list HEAD --count)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "versionCode=$((1000 + $COUNT))" >> $GITHUB_OUTPUT
          echo "Found version: $VERSION, versionCode: $((1000 + $COUNT))"
  build:
    needs: setup
    uses: ./.github/workflows/build.yml
    with:
      ref: ${{ needs.setup.outputs.version }}

  release:
    needs: [setup, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
      - name: Display artifacts
        run: ls -R
      - name: zip
        id: zip
        run: |
          for dir in *; do
            if [ -d "$dir" ]; then
              echo "----- Zip $dir -----"
              (cd $dir && zip -r9 "../$dir.zip" ./*)
              rm -r $dir
            fi
          done
          echo "release=$(ls *-release.zip)" >> $GITHUB_OUTPUT

      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.setup.outputs.version }}
          files: |
            *.zip

      - name: Cleanup
        run: |
          rm -rf *.zip

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: write update.json
        run: |
          version="${{ needs.setup.outputs.version }}"
          versionCode="${{ needs.setup.outputs.versionCode }}"
          zipUrl="https://github.com/geniucker-dev/WalletFix4OOS/releases/download/${version}/${{ steps.zip.outputs.release }}"
          echo '{
            "version": "'${version}'",
            "versionCode": '${versionCode}',
            "zipUrl": "'${zipUrl}'",
            "changelog": "https://raw.githubusercontent.com/geniucker-dev/WalletFix4OOS/main/changelog.md"
          }' > update.json

          # update build.gradle.kts
          version="${{ needs.setup.outputs.version }}"
          echo "Updating build.gradle.kts verName to ${version}"
          # Replace the line that defines verName; do not commit here
          sed -E -i "s/val verName by extra\\(\"[^\"]*\"\\)/val verName by extra(\"${version}\")/" build.gradle.kts

          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add update.json
          git add build.gradle.kts
          git commit -m "Update update.json and build.gradle.kts"
          git push
