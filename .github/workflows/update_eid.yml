name: Update eID HAL files

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Direct URL of the full OTA update package (Optional if sf_folder is provided).'
        required: false
      sf_folder:
        description: 'SourceForge folder prefix (e.g. "Oneplus 13/OxygenOS Flashers")'
        required: false
      msg:
        description: 'Message for the commit.'
        required: true

permissions:
  contents: write

jobs:
  update:
    name: Update eID HAL files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip curl aria2
          # We need lpunpack.py to extract super.img
          wget https://raw.githubusercontent.com/unix3dgforce/lpunpack/master/lpunpack.py -O /tmp/lpunpack.py

      - name: Fetch OTA URL
        id: fetch_url
        run: |
          if [ -n "${{ github.event.inputs.url }}" ]; then
            echo "ota_url=${{ github.event.inputs.url }}" >> $GITHUB_OUTPUT
          elif [ -n "${{ github.event.inputs.sf_folder }}" ]; then
            python sf_finder.py -p oneplus13flashers -f "${{ github.event.inputs.sf_folder }}" --url-only
          else
            echo "Error: Must provide either url OR sf_folder"
            exit 1
          fi

      - name: Setup
        id: setup
        run: |
          # Extract a stable filename even with encoded characters and query params
          FIRST_URL=$(echo "${{ steps.fetch_url.outputs.ota_url }}" | awk '{print $1}')
          CLEAN_NAME=$(echo "$FIRST_URL" | sed 's|.*/||; s|/download$||; s|?.*||')
          echo "FILENAME=$CLEAN_NAME" >> $GITHUB_OUTPUT

      - name: Download prebuild fuse.erofs
        run: |
          wget -O /tmp/erofs-utils.zip https://github.com/sekaiacg/erofs-utils/releases/download/v1.8.10-251024/erofs-utils-v1.8.10-g878e67d4-251024-Linux_x86_64.zip
          unzip -o /tmp/erofs-utils.zip -d /tmp/erofs-utils
          chmod -R +x /tmp/erofs-utils

      - name: Restore cached odm.img
        id: restore_cache_odm
        uses: actions/cache/restore@v4
        with:
          path: output/odm.img
          key: ${{ steps.setup.outputs.FILENAME }}-odm

      - name: Download and Extract super.img
        run: |
          if [ ! -f output/odm.img ]; then
            echo "URLs to download: ${{ steps.fetch_url.outputs.ota_url }}"
            
            rm -f firmware.zip
            i=1
            for url in ${{ steps.fetch_url.outputs.ota_url }}; do
              echo "Downloading part $i..."
              curl -L -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
                   -o "part_$i" "$url"
              i=$((i+1))
            done
            
            echo "Joining parts..."
            cat part_* > firmware.zip
            rm part_*

            echo "Extracting super.img..."
            unzip -j firmware.zip "*super.img" -d ./ || echo "Could not extract super.img directly"
            
            if [ ! -f super.img ]; then
                echo "super.img not found! Looking inside firmware.zip..."
                unzip -l firmware.zip
                exit 1
            fi

            mkdir -p output
            echo "Extracting odm partition from super.img..."
            python /tmp/lpunpack.py -p odm_a super.img output/ || python /tmp/lpunpack.py -p odm_b super.img output/ || python /tmp/lpunpack.py -p odm super.img output/ || echo "Failed to extract odm"
            
            # Rename for consistency
            [ -f output/odm_a.img ] && mv output/odm_a.img output/odm.img
            [ -f output/odm_b.img ] && mv output/odm_b.img output/odm.img

            rm firmware.zip super.img
          fi

      - name: Save cache odm.img
        if: ${{ steps.restore_cache_odm.outputs.cache-hit != 'true' }}
        id: save_cache_odm
        uses: actions/cache/save@v4
        with:
          path: output/odm.img
          key: ${{ steps.restore_cache_odm.outputs.cache-primary-key }}

      - name: Update files
        run: |
          # check if remote odm branch exists
          if git fetch origin odm:odm; then
            git checkout odm
            git checkout --orphan odm-new
          else
            git checkout --orphan odm
            git reset --hard
          fi

          # mount images
          mkdir -p mnt
          sudo /tmp/erofs-utils/fuse.erofs output/odm.img mnt

          # use root due to permission issue of odm partition
          sudo bash << 'EOF'

          WORKDIR=$(pwd)

          # parse MODEL from build.prop
          MODEL=$(grep -m1 "^ro.vendor.product.oem=" $WORKDIR/mnt/build.prop | cut -d "=" -f 2)
          echo "model: $MODEL"
          # if empty model, exit with error
          if [ -z "$MODEL" ]; then
            echo "Error: Unable to parse model from build.prop"
            exit 1
          fi

          # clear old odm files
          if [ -d $WORKDIR/odms/$MODEL ]; then
            rm -rf $WORKDIR/odms/$MODEL
          fi
          mkdir -p $WORKDIR/odms/$MODEL

          # show eID related files
          (cd $WORKDIR/mnt; find . -name "*eid*" -type f -exec ls -l {} \;)

          # copy eID related files
          mkdir -p $WORKDIR/odms/$MODEL/odm
          (cd $WORKDIR/mnt; find . -name "*eid*" -type f -exec cp --parents {} $WORKDIR/odms/$MODEL/odm/ \;)

          EOF

          # unmount images safely
          sudo umount -l mnt || true

          # Remove large files if any accidentally copied
          find odms -name "*.img" -delete || true
    
      - name: Cleanup
        run: |
          rm -rf mnt
          rm -rf output
          rm -f firmware.zip
          rm -f part_*
          rm -f super.img
          rm -f download_list.txt

      - name: Commit changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Split large files in odms if they exist (though shouldn't for EID files)
          find odms -size +90M -exec echo "Splitting large file: {}" \; -exec split -b 90M {} "{}.part_" \; -exec rm {} \;

          if [ -d odms ]; then
            git add odms
          else
            echo "No odms directory found"
            exit 1
          fi

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "${{ github.event.inputs.msg }}"
            git push -f origin HEAD:odm
          fi
