name: Update apks

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Direct URL of the full OTA update package (Optional if sf_folder is provided).'
        required: false
      sf_folder:
        description: 'SourceForge folder prefix (e.g. "Oneplus 13/OxygenOS Flashers")'
        required: false
      msg:
        description: 'Message for the commit.'
        required: true

permissions:
  contents: write

jobs:
  update:
    name: Update apks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip curl aria2
          # We need lpunpack.py to extract super.img
          wget https://raw.githubusercontent.com/unix3dgforce/lpunpack/master/lpunpack.py -O /tmp/lpunpack.py

      - name: Fetch OTA URL
        id: fetch_url
        run: |
          if [ -n "${{ github.event.inputs.url }}" ]; then
            echo "ota_url=${{ github.event.inputs.url }}" >> $GITHUB_OUTPUT
          elif [ -n "${{ github.event.inputs.sf_folder }}" ]; then
            python sf_finder.py -p oneplus13flashers -f "${{ github.event.inputs.sf_folder }}" --url-only
          else
            echo "Error: Must provide either url OR sf_folder"
            exit 1
          fi

      - name: Setup
        id: setup
        run: |
          FIRST_URL=$(echo "${{ steps.fetch_url.outputs.ota_url }}" | awk '{print $1}')
          echo "FILENAME=$(basename "$FIRST_URL" | cut -d'?' -f1)" >> $GITHUB_OUTPUT

      - name: Download prebuild fuse.erofs
        run: |
          wget -O /tmp/erofs-utils.zip https://github.com/sekaiacg/erofs-utils/releases/download/v1.8.10-251024/erofs-utils-v1.8.10-g878e67d4-251024-Linux_x86_64.zip
          unzip -o /tmp/erofs-utils.zip -d /tmp/erofs-utils
          chmod -R +x /tmp/erofs-utils

      - name: Restore cached my_stock.img
        id: restore_cache_my_stock
        uses: actions/cache/restore@v4
        with:
          path: output/my_stock.img
          key: ${{ steps.setup.outputs.FILENAME }}-my_stock
      
      - name: Restore cached my_heytap.img
        id: restore_cache_my_heytap
        uses: actions/cache/restore@v4
        with:
          path: output/my_heytap.img
          key: ${{ steps.setup.outputs.FILENAME }}-my_heytap

      - name: Download and Extract super.img
        run: |
          if [ ! -f output/my_stock.img ] || [ ! -f output/my_heytap.img ]; then
            echo "URLs to download: ${{ steps.fetch_url.outputs.ota_url }}"
            
            # Create a download list for aria2
            rm -f download_list.txt
            i=1
            for url in ${{ steps.fetch_url.outputs.ota_url }}; do
              echo "$url" >> download_list.txt
              echo "  out=part_$i" >> download_list.txt
              i=$((i+1))
            done
            
            echo "Downloading with aria2 (multi-threaded)..."
            aria2c -i download_list.txt -x 16 -s 16 -j 5 --summary-interval=5
            
            echo "Joining parts..."
            # Get count of parts
            part_count=$(grep -c "^http" download_list.txt)
            rm -f firmware.zip
            for j in $(seq 1 $part_count); do
              cat "part_$j" >> firmware.zip
              rm "part_$j"
            done
            rm download_list.txt

            echo "Extracting super.img..."
            unzip -j firmware.zip "*super.img" -d ./ || echo "Could not extract super.img directly"
            
            if [ ! -f super.img ]; then
                echo "super.img not found! Looking inside firmware.zip..."
                unzip -l firmware.zip
                exit 1
            fi

            mkdir -p output
            echo "Extracting partitions from super.img..."
            python /tmp/lpunpack.py -p my_stock_a super.img output/ || python /tmp/lpunpack.py -p my_stock_b super.img output/ || python /tmp/lpunpack.py -p my_stock super.img output/ || echo "Failed to extract my_stock"
            python /tmp/lpunpack.py -p my_heytap_a super.img output/ || python /tmp/lpunpack.py -p my_heytap_b super.img output/ || python /tmp/lpunpack.py -p my_heytap super.img output/ || echo "Failed to extract my_heytap"
            
            # Rename for consistency if they have _a or _b suffixes
            [ -f output/my_stock_a.img ] && mv output/my_stock_a.img output/my_stock.img
            [ -f output/my_stock_b.img ] && mv output/my_stock_b.img output/my_stock.img
            [ -f output/my_heytap_a.img ] && mv output/my_heytap_a.img output/my_heytap.img
            [ -f output/my_heytap_b.img ] && mv output/my_heytap_b.img output/my_heytap.img

            rm firmware.zip super.img
          fi

      - name: Save cache my_stock.img
        if: ${{ steps.restore_cache_my_stock.outputs.cache-hit != 'true' }}
        id: save_cache_my_stock
        uses: actions/cache/save@v4
        with:
          path: output/my_stock.img
          key: ${{ steps.restore_cache_my_stock.outputs.cache-primary-key }}

      - name: Save cache my_heytap.img
        if: ${{ steps.restore_cache_my_heytap.outputs.cache-hit != 'true' }}
        id: save_cache_my_heytap
        uses: actions/cache/save@v4
        with:
          path: output/my_heytap.img
          key: ${{ steps.restore_cache_my_heytap.outputs.cache-primary-key }}

      - name: Update files
        run: |
          git checkout --orphan apk
          git reset --hard

          # mount images
          mkdir -p mnt/my_stock
          mkdir -p mnt/my_heytap
          /tmp/erofs-utils/fuse.erofs output/my_stock.img mnt/my_stock
          /tmp/erofs-utils/fuse.erofs output/my_heytap.img mnt/my_heytap

          # update files
          mkdir -p product/priv-app
          cp -r mnt/my_stock/priv-app/KeKeUserCenter product/priv-app/
          cp -r mnt/my_stock/priv-app/KeKeUserCenterAccount product/priv-app/
          cp -r mnt/my_stock/priv-app/OppoGallery2 product/priv-app/
          if [ -d mnt/my_heytap/priv-app/OpenID ]; then
            cp -r mnt/my_heytap/priv-app/OpenID product/priv-app/
          elif [ -d mnt/my_stock/priv-app/OpenID ]; then
            cp -r mnt/my_stock/priv-app/OpenID product/priv-app/
          else
            echo "OpenID not found"
            exit 1
          fi

          mkdir -p product/app
          if [ -d mnt/my_heytap/app/KeKePay ]; then
            cp -r mnt/my_heytap/app/KeKePay product/app/
          elif [ -d mnt/my_stock/app/KeKePay ]; then
            cp -r mnt/my_stock/app/KeKePay product/app/
          else
            echo "KeKePay not found"
            exit 1
          fi
          if [ -d mnt/my_heytap/app/TasWallet ]; then
            cp -r mnt/my_heytap/app/TasWallet product/app/
          elif [ -d mnt/my_stock/app/TasWallet ]; then
            cp -r mnt/my_stock/app/TasWallet product/app/
          else
            echo "TasWallet not found"
            exit 1
          fi
          
          # unmount images safely
          sudo umount -l mnt/my_stock || true
          sudo umount -l mnt/my_heytap || true

          # Remove optimized files to save space (vdex, odex are not needed for the module)
          find product -type d -name "oat" -exec rm -rf {} + || true
    
      - name: Cleanup
        run: |
          rm -rf mnt
          rm -rf output
          rm -f firmware.zip
          rm -f part_*
          rm -f super.img
          rm -f download_list.txt

      - name: Commit changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Initialize Git LFS
          git lfs install
          
          # Track APK files with LFS
          git lfs track "*.apk"
          git add .gitattributes

          # Only add the product directory to the apk branch
          if [ -d product ]; then
            git add product
          else
            echo "Error: product directory not found!"
            exit 1
          fi
          
          # Check if there's anything to commit
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "${{ github.event.inputs.msg }}"
            echo "Pushing changes to origin apk branch with Git LFS..."
            git push -f origin apk
          fi
